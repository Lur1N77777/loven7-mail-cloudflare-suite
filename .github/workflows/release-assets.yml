name: Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-assets-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  sync-release-assets:
    name: Sync source ZIP asset
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build source ZIP
        shell: bash
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          if [ -z "$tag" ]; then
            echo "Release tag is empty."
            exit 1
          fi

          git fetch --force --tags
          if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} does not exist."
            exit 1
          fi

          mkdir -p release-assets
          asset="release-assets/loven7-mail-cloudflare-suite-${tag}-source.zip"
          git archive --format=zip --prefix="loven7-mail-cloudflare-suite-${tag}/" -o "$asset" "$tag"
          sha256sum "$asset" | tee release-assets/SHA256SUMS.txt

          cat > release-assets/RELEASE_NOTES.md <<EOF
          ${tag}

          自动同步当前 tag 对应的源码压缩包。

          资产：
          - loven7-mail-cloudflare-suite-${tag}-source.zip
          - SHA256SUMS.txt
          EOF

      - name: Create or update GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          asset="release-assets/loven7-mail-cloudflare-suite-${tag}-source.zip"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset" release-assets/SHA256SUMS.txt --clobber
          else
            gh release create "$tag" "$asset" release-assets/SHA256SUMS.txt \
              --verify-tag \
              --title "$tag" \
              --notes-file release-assets/RELEASE_NOTES.md
          fi
